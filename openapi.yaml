  /event/{id}/applies:
    post:
      tags: [Event]
      summary: Get event applies
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /event/{id}:
    get:
      tags: [Event]
      summary: Get event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: Not found }
    delete:
      tags: [Event]
      summary: Cancel event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /event/types:
    post:
      tags: [Event]
      summary: Event types list
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /event/apply:
    post:
      tags: [Event]
      summary: Apply to event
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /event/{id}/like:
    post:
      tags: [Event]
      summary: Like event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
