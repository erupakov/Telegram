openapi: 3.0.3
info:
  title: Divo API
  description: Backend API for Divo mobile and web clients. Authentication, user management, publications, events, feed, wallet, messenger, and related domains.
  version: 1.0.0

servers:
  - url: /api
    description: API base path (prepend host from APP_URL)

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and registration
  - name: User
    description: User profile and account
  - name: Publication
    description: Publications and feed content
  - name: Event
    description: Events and applies
  - name: File
    description: File upload and resize
  - name: Agency
    description: Agencies and models
  - name: Agency Employee
    description: Agency employee roles
  - name: Customer
    description: Customer roles
  - name: Geo
    description: Geocoding and address search
  - name: Feedline
    description: Feed and feedline
  - name: Follower
    description: Followers and following
  - name: Favorite
    description: Favorites (organization roles)
  - name: User Gallery
    description: User gallery photos
  - name: Social Network
    description: Social network and Instagram
  - name: User Social Network
    description: User social network links
  - name: Messenger
    description: Chat and messenger (some routes throttled)
  - name: Dictionary
    description: Lookup dictionaries
  - name: User Geoposition
    description: User geoposition
  - name: Radar
    description: Radar, places, reviews (model/radar access)
  - name: Wallet
    description: Wallets and transactions
  - name: User Paid Services
    description: Paid services
  - name: NFT
    description: NFT create, list, buy
  - name: Banners
    description: Banners
  - name: System
    description: System and feature flags
  - name: Crypto
    description: Crypto webhook (no auth)

paths:
  # ---- Auth ----
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Email/password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, deviceId, deviceType]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                deviceId: { type: string }
                deviceType: { type: string }
      responses:
        '200': { description: Success; returns accessToken }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/registration:
    post:
      tags: [Auth]
      security: []
      summary: Email registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, timezone, role]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                timezone: { type: string }
                role: { type: string, enum: [new_face, model, agency_employee, customer] }
      responses:
        '200': { description: Success; may return token for email confirmation }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/registration-social:
    post:
      tags: [Auth]
      security: []
      summary: Social (Firebase) registration
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firebaseToken: { type: string }
                deviceId: { type: string }
                deviceType: { type: string }
      responses:
        '200': { description: Success }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login-social:
    post:
      tags: [Auth]
      security: []
      summary: Social (Firebase) login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firebaseToken: { type: string }
                deviceId: { type: string }
                deviceType: { type: string }
      responses:
        '200': { description: Success; returns accessToken }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/send-email-code:
    post:
      tags: [Auth]
      security: []
      summary: Send email code (confirm_email, forgot_password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, type]
              properties:
                email: { type: string, format: email }
                type: { type: string, enum: [confirm_email, forgot_password] }
      responses:
        '200': { description: Success; returns token for confirm step }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/confirm-email:
    post:
      tags: [Auth]
      security: []
      summary: Confirm email by code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, token, deviceId, deviceType]
              properties:
                code: { type: integer }
                token: { type: string }
                deviceId: { type: string }
                deviceType: { type: string }
      responses:
        '200': { description: Success; returns accessToken }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/confirm-code:
    post:
      tags: [Auth]
      security: []
      summary: Confirm code
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Success }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/reset-password:
    post:
      tags: [Auth]
      security: []
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, code, password]
              properties:
                token: { type: string }
                code: { type: integer }
                password: { type: string }
      responses:
        '200': { description: Success }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/find-user:
    post:
      tags: [Auth]
      security: []
      summary: Find user by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: Success }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---- User ----
  /user/info:
    get:
      tags: [User]
      summary: Current user info
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /user/rating:
    get:
      tags: [User]
      summary: User rating
      responses:
