      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /feedline/user-activity:
    post:
      tags: [Feedline]
      summary: User activity
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
