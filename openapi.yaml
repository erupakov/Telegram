        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: Not found }

  # ---- Follower ----
  /follower/follow:
    post:
      tags: [Follower]
      summary: Follow user
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /follower/unfollow:
    post:
      tags: [Follower]
      summary: Unfollow user
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /follower/following:
    post:
      tags: [Follower]
      summary: Following list
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /follower/followers:
    post:
      tags: [Follower]
      summary: Followers list
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---- Favorite ----
  /favorite/mark:
    post:
      tags: [Favorite]
      summary: Mark favorite (organization roles only)
