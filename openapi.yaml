        '401': { $ref: '#/components/responses/Unauthorized' }

  /user/delete-account:
    delete:
      tags: [User]
      summary: Delete account
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /user/change-role:
    post:
      tags: [User]
      summary: Change role
      requestBody:
        content:
