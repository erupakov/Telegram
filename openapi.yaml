  /publication/{id}:
    post:
      tags: [Publication]
      summary: Edit publication
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Publication]
      summary: Delete publication
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
