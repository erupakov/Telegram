            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /event/update/{id}:
    post:
      tags: [Event]
      summary: Update event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
