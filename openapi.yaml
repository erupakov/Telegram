        '200': { description: Success }

  /geo/search-geocoder:
    get:
      tags: [Geo]
      security: []
      summary: Geocoder search
      parameters:
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200': { description: Success }

  # ---- Feedline ----
  /feedline/list:
    post:
      tags: [Feedline]
      summary: List feed
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /feedline/like:
