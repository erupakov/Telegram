      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /user/{id}:
    get:
      tags: [User]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: Not found }

  /user/update-profile:
    post:
      tags: [User]
      summary: Update profile
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /user/update-password:
    post:
      tags: [User]
      summary: Update password
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /user/update-email:
    post:
      tags: [User]
      summary: Update email
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /user/update-email-confirm:
    post:
      tags: [User]
      summary: Confirm email update
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /user/list-with-wallets:
    post:
      tags: [User]
      summary: List users with wallets
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /user/save-push-token:
    post:
      tags: [User]
      summary: Save push token
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /user/send-test-push:
    post:
      tags: [User]
      summary: Send test push
      requestBody:
