        '401': { $ref: '#/components/responses/Unauthorized' }

  /event/{id}/unlike:
    post:
      tags: [Event]
      summary: Unlike event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---- File ----
  /file/upload-file:
    post:
      tags: [File]
      security: []
      summary: Upload single file
      requestBody:
        content:
          multipart/form-data:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '422': { $ref: '#/components/responses/ValidationError' }

  /file/upload-files:
    post:
      tags: [File]
      security: []
      summary: Upload multiple files
      requestBody:
        content:
          multipart/form-data:
            schema: { type: object }
      responses:
        '200': { description: Success }
        '422': { $ref: '#/components/responses/ValidationError' }

  /file/resize:
    get:
      tags: [File]
      security: []
      summary: Resize image
      parameters:
        - name: url
          in: query
          schema: { type: string }
        - name: width
          in: query
          schema: { type: integer }
        - name: height
          in: query
          schema: { type: integer }
      responses:
        '200': { description: Success }

