        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---- Agency Employee ----
  /agency-employee/roles:
    get:
      tags: [Agency Employee]
      summary: Agency employee roles
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---- Customer ----
  /customer/roles:
    get:
      tags: [Customer]
      summary: Customer roles
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---- Geo ----
  /geo/search-by-address-name:
