      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /user/viewers:
    get:
      tags: [User]
      summary: Viewers list
      responses:
        '200': { description: Success }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /user/budge-count:
    get:
      tags: [User]
