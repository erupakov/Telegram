components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from login, registration, or social auth

  responses:
    Unauthorized:
      description: Unauthenticated or invalid token
    Forbidden:
      description: Authenticated but not allowed
    ValidationError:
      description: Validation failed (422)

  schemas:
    Error:
      type: object
      properties:
        message: { type: string }
        errors: { type: object }
